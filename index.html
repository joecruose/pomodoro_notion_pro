<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Pomodoro | Premium</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">

  <style>
    /* DEFAULT MONOCHROME VARIABLES (Overridden by URL Token) */
    :root {
      --bg-transparent: transparent;
      --block-bg: #272727; 
      --block-border: #3A3A3A;
      --card-top: #1F1F1F;
      --card-bottom: #111111;
      --text-main: #FFFFFF;
      --text-muted: #888888;
      --accent: #FFFFFF;
      --accent-text: #272727;
      --font-ui: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
      background-color: var(--bg-transparent); display: flex; justify-content: center;
      align-items: center; font-family: var(--font-ui); -webkit-font-smoothing: antialiased;
    }

    .widget-block {
      background-color: var(--block-bg); border: 1px solid var(--block-border);
      border-radius: 24px; padding: 32px 32px 24px 32px; display: flex; flex-direction: column;
      align-items: center; gap: 24px; width: 100%; max-width: 340px;
      transition: all 0.3s ease;
    }

    /* 1. SLIDING TABS */
    .mode-tabs {
      position: relative; display: flex; background: rgba(0,0,0,0.15);
      padding: 6px; border-radius: 20px; width: 100%; max-width: 280px;
    }

    .tab-indicator {
      position: absolute; top: 6px; bottom: 6px; width: calc(33.33% - 4px);
      background: var(--text-main); border-radius: 14px;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); z-index: 0;
    }

    .pill-btn {
      flex: 1; position: relative; z-index: 1; background: transparent; border: none;
      color: var(--text-muted); padding: 8px 0; font-family: var(--font-ui);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: color 0.3s ease;
    }

    .pill-btn:hover { color: color-mix(in srgb, var(--text-main) 80%, transparent); }
    .pill-btn.active { color: var(--accent-text); cursor: default; }

    /* 2. TIMER DISPLAY */
    .timer-display { display: flex; align-items: center; gap: 8px; }

    .card {
      position: relative; width: 100px; height: 140px; 
      background: linear-gradient(to bottom, var(--card-top) 50%, var(--card-bottom) 50%);
      border-radius: 12px; display: flex; justify-content: center; align-items: center; overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--text-main) 10%, transparent); 
    }

    .number {
      font-family: 'Oswald', sans-serif; font-size: 80px; font-weight: 700; color: var(--text-main);
      font-variant-numeric: tabular-nums; transform: scaleY(1.10); padding-bottom: 8px; z-index: 1;
    }

    .card::after {
      content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
      background-color: rgba(0,0,0,0.4); z-index: 5;
    }

    .colon {
      font-family: 'Oswald', sans-serif; font-size: 50px; font-weight: 700; color: var(--text-muted);
      padding-bottom: 10px; animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* 3. MAIN CONTROLS */
    .controls { display: flex; align-items: center; gap: 16px; width: 100%; justify-content: center; }

    .btn-main {
      background: var(--accent); color: var(--accent-text); border: none; padding: 14px 36px;
      border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer;
      transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.2s ease;
      flex-grow: 1; max-width: 160px; 
    }

    .btn-main:active { transform: scale(0.95); }
    .btn-main:hover { opacity: 0.9; }

    .btn-icon {
      background: rgba(0,0,0,0.1); border: 1px solid var(--block-border); color: var(--text-main);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); padding: 12px; border-radius: 50%;
    }

    .btn-icon:hover { background: var(--text-main); color: var(--accent-text); transform: rotate(-45deg); }
    .btn-icon:active { transform: scale(0.9) rotate(-45deg); }
    .btn-icon svg { width: 20px; height: 20px; fill: currentColor; }

    /* 4. ELEGANT SINE WAVE VISUALIZER */
    .music-container { 
      width: 100%; display: flex; justify-content: center; align-items: center;
      border-top: 1px solid var(--block-border); padding-top: 20px; cursor: pointer;
    }

    #wave-canvas {
      width: 100%; height: 36px;
      display: block; opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .music-container:hover #wave-canvas {
      opacity: 1;
    }

  </style>
</head>
<body>

  <div class="widget-block">
    
    <div class="mode-tabs">
      <div class="tab-indicator" id="tab-slider"></div>
      <button class="pill-btn active" id="btn-pomo" onclick="setMode('pomo', 0)">Pomodoro</button>
      <button class="pill-btn" id="btn-short" onclick="setMode('short', 1)">Short</button>
      <button class="pill-btn" id="btn-long" onclick="setMode('long', 2)">Long</button>
    </div>

    <div class="timer-display">
      <div class="card"><div class="number" id="minutes">25</div></div>
      <div class="colon">:</div>
      <div class="card"><div class="number" id="seconds">00</div></div>
    </div>

    <div class="controls">
      <button class="btn-main" id="btn-start" onclick="toggleTimer()">Start</button>
      <button class="btn-icon" id="btn-reset" onclick="resetTimer()" aria-label="Reset Timer">
        <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"></path></svg>
      </button>
    </div>

    <div class="music-container" onclick="toggleMute()" title="Toggle Audio">
      <canvas id="wave-canvas"></canvas>
    </div>

    <audio id="bgm-player" loop preload="auto"></audio>

  </div>

  <script>
    /* --- 1. STATE VARIABLES --- */
    const MODES = { pomo: 25 * 60, short: 5 * 60, long: 15 * 60 };
    let currentMode = 'pomo';
    let timeLeft = MODES.pomo;
    let timerId = null;
    let isRunning = false;
    let isMuted = false;

    /* --- 2. DOM ELEMENTS --- */
    const audioPlayer = document.getElementById('bgm-player');
    const elMinutes = document.getElementById('minutes');
    const elSeconds = document.getElementById('seconds');
    const btnStart = document.getElementById('btn-start');
    const tabSlider = document.getElementById('tab-slider');

    /* --- 3. TRACK DATABASE --- */
    const trackDatabase = {
      1: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613675/lofi-beats-01_lekqtn.mp3',
      2: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613677/lofi-beats-02_xmxqxk.mp3',
      3: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613673/lofi-beats-03_eesska.mp3',
      4: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613674/lofi-beats-04_lmei67.mp3',
      5: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613674/lofi-beats-05_ivzaqg.mp3',
      6: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613677/lofi-beats-06_vrivte.mp3',
      7: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613679/lofi-beats-07_utgcd3.mp3',
      8: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613678/lofi-beats-08_sjrjev.mp3',
      9: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613675/lofi-beats-09_yrrmq0.mp3',
      10: 'https://res.cloudinary.com/drwyxn1v7/video/upload/v1781613678/lofi-beats-10_xpw9td.mp3'
    };

    /* --- 4. DECODING & INJECTION --- */
    function initializeWidget() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      let trackNum = 1;

      if (token) {
        try {
          const payload = JSON.parse(atob(token));
          
          // Apply Colors
          const bgHex = parseInt(payload.c1, 36).toString(16).padStart(6, '0');
          const textHex = parseInt(payload.c2, 36).toString(16).padStart(6, '0');
          
          const root = document.documentElement;
          root.style.setProperty('--block-bg', `#${bgHex}`);
          root.style.setProperty('--card-top', `color-mix(in srgb, #${bgHex} 80%, black)`);
          root.style.setProperty('--card-bottom', `color-mix(in srgb, #${bgHex} 60%, black)`);
          root.style.setProperty('--text-main', `#${textHex}`);
          root.style.setProperty('--accent', `#${textHex}`);
          root.style.setProperty('--accent-text', `#${bgHex}`);
          root.style.setProperty('--text-muted', `color-mix(in srgb, #${textHex} 50%, #${bgHex})`);
          root.style.setProperty('--block-border', `color-mix(in srgb, #${textHex} 15%, #${bgHex})`);

          // Apply Tracks & Custom Intervals
          trackNum = payload.tr || 1;
          if (payload.pm) MODES.pomo = parseInt(payload.pm) * 60;
          if (payload.sb) MODES.short = parseInt(payload.sb) * 60;
          if (payload.lb) MODES.long = parseInt(payload.lb) * 60;

        } catch (e) {
          console.warn("Invalid or missing configuration token. Loading default theme.");
        }
      }
      
      audioPlayer.src = trackDatabase[trackNum];
      timeLeft = MODES.pomo; 
    }

    /* --- 5. ZERO-DEPENDENCY SOUNDS --- */
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let sfxCtx;

    function initAudio() {
      if (!sfxCtx) sfxCtx = new AudioContext();
      if (sfxCtx.state === 'suspended') sfxCtx.resume();
    }

    function playClickSound() {
      initAudio();
      const osc = sfxCtx.createOscillator();
      const gain = sfxCtx.createGain();
      osc.connect(gain);
      gain.connect(sfxCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, sfxCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, sfxCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.3, sfxCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, sfxCtx.currentTime + 0.05);
      osc.start();
      osc.stop(sfxCtx.currentTime + 0.05);
    }

    function playBellSound() {
      initAudio();
      const osc = sfxCtx.createOscillator();
      const gain = sfxCtx.createGain();
      osc.connect(gain);
      gain.connect(sfxCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, sfxCtx.currentTime);
      gain.gain.setValueAtTime(0.6, sfxCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, sfxCtx.currentTime + 2.5);
      osc.start();
      osc.stop(sfxCtx.currentTime + 2.5);
    }

    /* --- 6. TIMER LOGIC --- */
    function updateDisplay() {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      elMinutes.textContent = String(m).padStart(2, '0');
      elSeconds.textContent = String(s).padStart(2, '0');
    }

    function setMode(mode, index) {
      playClickSound();
      if (isRunning) toggleTimer(false); 
      
      currentMode = mode;
      timeLeft = MODES[mode];
      updateDisplay();

      tabSlider.style.transform = `translateX(${index * 100}%)`;

      document.getElementById('btn-pomo').classList.remove('active');
      document.getElementById('btn-short').classList.remove('active');
      document.getElementById('btn-long').classList.remove('active');
      document.getElementById(`btn-${mode}`).classList.add('active');
    }

    function toggleTimer(triggerSound = true) {
      if (triggerSound) playClickSound();

      if (isRunning) {
        clearInterval(timerId);
        btnStart.textContent = "Start";
        isRunning = false;
        audioPlayer.pause();
      } else {
        // RESET SAFEGUARD: Prevent negative countdowns
        if (timeLeft <= 0) {
          timeLeft = MODES[currentMode];
          updateDisplay();
        }

        timerId = setInterval(() => {
          timeLeft--;
          updateDisplay();
          if (timeLeft <= 0) {
            toggleTimer(false); 
            playBellSound(); 
          }
        }, 1000);
        
        btnStart.textContent = "Pause";
        isRunning = true;
        
        if(!isMuted) {
            let playPromise = audioPlayer.play();
            if (playPromise !== undefined) {
              playPromise.catch(error => console.warn("Audio deferred:", error));
            }
        }
      }
    }

    function resetTimer() {
      playClickSound();
      if (isRunning) toggleTimer(false);
      timeLeft = MODES[currentMode];
      updateDisplay();
    }

    function toggleMute() {
      isMuted = !isMuted;
      if (isMuted) {
        audioPlayer.pause();
      } else if (isRunning) {
        audioPlayer.play();
      }
    }

    /* --- 7. ELEGANT SINE WAVE VISUALIZER --- */
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');
    let phase = 0;
    let currentAmplitude = 0;

    function resizeCanvas() {
      canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    }
    
    // Initialize canvas sizing
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 0);

    function drawWave() {
      requestAnimationFrame(drawWave);
      
      const isPlaying = isRunning && !isMuted && !audioPlayer.paused;
      const targetAmplitude = isPlaying ? 12 : 0;
      currentAmplitude += (targetAmplitude - currentAmplitude) * 0.1; // Smooth transition
      
      if (isPlaying) phase += 0.05; // Horizontal scrolling speed
      
      const width = canvas.width;
      const height = canvas.height;
      const dpr = window.devicePixelRatio;
      const centerY = height / 2;
      
      ctx.clearRect(0, 0, width, height);
      
      // Grab the live CSS variable color dynamically
      const color = getComputedStyle(document.documentElement).getPropertyValue('--text-main').trim() || '#FFFFFF';
      
      function drawSine(frequency, amplitudeMulti, phaseOffset, alpha, lineWidth) {
        ctx.beginPath();
        ctx.moveTo(0, centerY);
        for (let x = 0; x < width; x += 2) {
            const xPos = x / dpr;
            const y = Math.sin((xPos * frequency) + phaseOffset) * (currentAmplitude * amplitudeMulti * dpr);
            ctx.lineTo(x, centerY + y);
        }
        ctx.strokeStyle = color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = lineWidth * dpr;
        ctx.stroke();
      }
      
      // Draw two overlapping waves for a fluid, ambient look
      drawSine(0.04, 1.0, phase, 1.0, 2);           // Main thick wave
      drawSine(0.06, 0.6, -phase * 0.8, 0.3, 1.5);  // Background ghost wave
    }
    
    // Start the animation loop
    drawWave();

    /* --- 8. BOOT UP --- */
    initializeWidget();
    updateDisplay();
  </script>

</body>
</html>
