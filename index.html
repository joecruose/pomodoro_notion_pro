<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Pomodoro | Unified Block</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">

  <style>
    /* MONOCHROME VARIABLES */
    :root {
      --bg-transparent: transparent;
      --block-bg: #272727; 
      --block-border: #3A3A3A;
      --card-top: #1F1F1F;
      --card-bottom: #111111;
      --text-main: #FFFFFF;
      --text-muted: #999999;
      --accent: #FFFFFF;
      --accent-text: #272727;
      --font-ui: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; 
      background-color: var(--bg-transparent);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
    }

    /* THE UNIFIED WIDGET BLOCK */
    .widget-block {
      background-color: var(--block-bg);
      border: 1px solid var(--block-border);
      border-radius: 24px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 320px;
    }

    /* 1. TOP TABS */
    .mode-tabs {
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.15);
      padding: 6px;
      border-radius: 20px;
    }

    .pill-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 14px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .pill-btn:hover {
      color: var(--text-main);
    }

    .pill-btn.active {
      background: var(--text-main);
      color: var(--accent-text);
    }

    /* 2. TIMER DISPLAY */
    .timer-display {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card {
      position: relative;
      width: 100px; 
      height: 140px; 
      background: linear-gradient(to bottom, var(--card-top) 50%, var(--card-bottom) 50%);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    .number {
      font-family: 'Oswald', sans-serif; 
      font-size: 80px; 
      font-weight: 700; 
      color: var(--text-main);
      font-variant-numeric: tabular-nums;
      transform: scaleY(1.10); 
      padding-bottom: 8px; 
      z-index: 1;
    }

    .card::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: rgba(0,0,0,0.6);
      z-index: 5;
    }

    .colon {
      font-family: 'Oswald', sans-serif;
      font-size: 50px;
      font-weight: 700;
      color: var(--text-muted);
      padding-bottom: 10px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 3. MAIN CONTROLS */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      justify-content: center;
    }

    .btn-main {
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      padding: 12px 36px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s ease;
      flex-grow: 1;
      max-width: 160px;
    }

    .btn-main:active { transform: scale(0.96); }
    .btn-main:hover { opacity: 0.9; }

    .btn-icon {
      background: rgba(0,0,0,0.15);
      border: 1px solid var(--block-border);
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      padding: 10px;
      border-radius: 50%;
    }

    .btn-icon:hover {
      background: var(--text-main);
      color: var(--accent-text);
      transform: rotate(-30deg);
    }

    .btn-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* 4. GENERIC AUDIO SELECTION */
    .music-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid var(--block-border);
      padding-top: 20px;
    }

    .music-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .music-controls {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .music-btn {
      background: transparent;
      border: 1px solid var(--block-border);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
      flex: 1;
    }

    .music-btn:hover { 
      border-color: var(--text-muted);
      color: var(--text-main); 
    }
    
    .music-btn.active {
      color: var(--text-main);
      border-color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>

  <div class="widget-block">
    
    <div class="mode-tabs">
      <button class="pill-btn active" id="btn-pomo" onclick="setMode('pomo')">Pomodoro</button>
      <button class="pill-btn" id="btn-short" onclick="setMode('short')">Short</button>
      <button class="pill-btn" id="btn-long" onclick="setMode('long')">Long</button>
    </div>

    <div class="timer-display">
      <div class="card">
        <div class="number" id="minutes">25</div>
      </div>
      <div class="colon">:</div>
      <div class="card">
        <div class="number" id="seconds">00</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-main" id="btn-start" onclick="toggleTimer()">Start</button>
      <button class="btn-icon" id="btn-reset" onclick="resetTimer()" aria-label="Reset Timer">
        <svg viewBox="0 0 24 24">
          <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"></path>
        </svg>
      </button>
    </div>

    <div class="music-container">
      <span class="music-label">Background Audio</span>
      <div class="music-controls">
        <button class="music-btn active" id="track-1" onclick="changeTrack(1, 'https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3')">Track 1</button>
        <button class="music-btn" id="track-2" onclick="changeTrack(2, 'https://cdn.pixabay.com/audio/2021/09/06/audio_37aeafba07.mp3')">Track 2</button>
        <button class="music-btn" id="track-3" onclick="changeTrack(3, 'https://cdn.pixabay.com/audio/2021/08/09/audio_6b528b18dc.mp3')">Track 3</button>
      </div>
    </div>

    <audio id="bgm-player" loop preload="none">
      <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
    </audio>

  </div>

  <script>
    /* --- TIMER & AUDIO LOGIC --- */
    const MODES = {
      pomo: 25 * 60,
      short: 5 * 60,
      long: 15 * 60
    };

    let currentMode = 'pomo';
    let timeLeft = MODES.pomo;
    let timerId = null;
    let isRunning = false;

    const elMinutes = document.getElementById('minutes');
    const elSeconds = document.getElementById('seconds');
    const btnStart = document.getElementById('btn-start');
    const audioPlayer = document.getElementById('bgm-player');

    function updateDisplay() {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      elMinutes.textContent = String(m).padStart(2, '0');
      elSeconds.textContent = String(s).padStart(2, '0');
    }

    function setMode(mode) {
      if (isRunning) toggleTimer(); // Pause if switching modes
      
      currentMode = mode;
      timeLeft = MODES[mode];
      updateDisplay();

      document.getElementById('btn-pomo').classList.remove('active');
      document.getElementById('btn-short').classList.remove('active');
      document.getElementById('btn-long').classList.remove('active');
      document.getElementById(`btn-${mode}`).classList.add('active');
    }

    function toggleTimer() {
      if (isRunning) {
        clearInterval(timerId);
        btnStart.textContent = "Start";
        isRunning = false;
        audioPlayer.pause(); // Instantly pause audio
      } else {
        timerId = setInterval(() => {
          timeLeft--;
          updateDisplay();
          if (timeLeft <= 0) {
            toggleTimer(); // Stop exactly at zero
          }
        }, 1000);
        btnStart.textContent = "Pause";
        isRunning = true;
        audioPlayer.play(); // Instantly play audio
      }
    }

    function resetTimer() {
      if (isRunning) toggleTimer();
      timeLeft = MODES[currentMode];
      updateDisplay();
    }

    function changeTrack(btnNum, audioUrl) {
      // 1. Update Buttons
      document.getElementById('track-1').classList.remove('active');
      document.getElementById('track-2').classList.remove('active');
      document.getElementById('track-3').classList.remove('active');
      document.getElementById(`track-${btnNum}`).classList.add('active');

      // 2. Load New Audio
      audioPlayer.src = audioUrl;
      
      // 3. Keep playing if the timer is already running
      if (isRunning) {
        audioPlayer.play();
      }
    }

    updateDisplay();
  </script>

</body>
</html>
